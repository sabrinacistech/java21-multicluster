server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cluster-availability-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=clusterdb;encrypt=false}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:yourStrong(!)Password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  cache:
    type: jcache
    jcache:
      config: classpath:ehcache.xml

cluster:
  alias: ${CLUSTER_ALIAS:primary-cluster}
  scheduler:
    default-polling-interval-seconds: ${CLUSTER_SCHEDULER_DEFAULT_POLLING_INTERVAL_SECONDS:30}
    initial-delay-seconds: ${CLUSTER_SCHEDULER_INITIAL_DELAY_SECONDS:5}
  cache:
    ttl-seconds: ${CLUSTER_CACHE_TTL_SECONDS:60}

resilience4j:
  circuitbreaker:
    instances:
      clusterStatusRepository:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
