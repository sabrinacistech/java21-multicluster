server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cluster-availability-service
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/clusterdb}
  cache:
    type: simple

cluster:
  alias: ${CLUSTER_ALIAS:primary-cluster}
  scheduler:
    default-polling-interval-seconds: ${CLUSTER_SCHEDULER_DEFAULT_POLLING_INTERVAL_SECONDS:30}
    initial-delay-seconds: ${CLUSTER_SCHEDULER_INITIAL_DELAY_SECONDS:5}
  cache:
    ttl-seconds: ${CLUSTER_CACHE_TTL_SECONDS:60}
    collection-name: ${CLUSTER_CACHE_COLLECTION_NAME:cluster_cache}

resilience4j:
  circuitbreaker:
    instances:
      clusterStatusRepository:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
