server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cluster-availability-service
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/clusterdb}
cluster:
  alias: ${CLUSTER_ALIAS:primary-cluster}
  scheduler:
    default-polling-interval-seconds: ${CLUSTER_SCHEDULER_DEFAULT_POLLING_INTERVAL_SECONDS:30}
    initial-delay-seconds: ${CLUSTER_SCHEDULER_INITIAL_DELAY_SECONDS:5}
  cache:
    ttl-seconds: ${CLUSTER_CACHE_TTL_SECONDS:60}
    collection-name: ${CLUSTER_CACHE_COLLECTION_NAME:cluster_cache}
  mongo:
    connect-timeout-ms: ${CLUSTER_MONGO_CONNECT_TIMEOUT_MS:500}
    read-timeout-ms: ${CLUSTER_MONGO_READ_TIMEOUT_MS:1000}
    server-selection-timeout-ms: ${CLUSTER_MONGO_SERVER_SELECTION_TIMEOUT_MS:1000}
    max-connection-pool-size: ${CLUSTER_MONGO_MAX_CONNECTION_POOL_SIZE:100}
    min-connection-pool-size: ${CLUSTER_MONGO_MIN_CONNECTION_POOL_SIZE:0}
    max-wait-time-ms: ${CLUSTER_MONGO_MAX_WAIT_TIME_MS:500}

resilience4j:
  circuitbreaker:
    instances:
      clusterStatusRepository:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      mongoCache:
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 25
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 250ms
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
